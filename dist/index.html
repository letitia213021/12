<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>黃莫迦的計算機</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* 莫蘭迪色系定義 */
        :root {
            --bg-color: #e0e5d9;      /* 灰綠色背景 */
            --calc-body: #9ab3ad;     /* 莫蘭迪深綠 */
            --display-bg: #f4f1de;    /* 奶油米白 */
            --btn-num: #d8e2dc;       /* 灰白色按鍵 */
            --btn-op: #adc178;        /* 橄欖綠按鍵 */
            --btn-special: #a98467;   /* 灰褐色按鍵 */
            --text-main: #4a4e69;     /* 煙燻灰文字 */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
        }

        .calculator {
            background-color: var(--calc-body);
            padding: 30px;
            border-radius: 12px; /* 方中帶圓的優雅弧度 */
            box-shadow: 20px 20px 60px #bececa, -20px -20px 60px #ffffff;
            width: 340px;
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* 顯示螢幕 */
        #display {
            width: 100%;
            height: 75px;
            font-family: 'Quicksand', sans-serif;
            font-size: 32px;
            text-align: right;
            margin-bottom: 25px;
            border: none;
            border-radius: 8px;
            padding: 20px;
            box-sizing: border-box;
            background-color: var(--display-bg);
            color: var(--text-main);
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.05);
        }

        /* 按鍵容器 */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* 方形按鍵樣式 */
        input[type="button"] {
            width: 100%;
            aspect-ratio: 1 / 1; /* 保持正方形 */
            border-radius: 10px; /* 輕微圓角 */
            border: none;
            font-size: 20px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: var(--btn-num);
            color: var(--text-main);
        }

        /* 按鍵懸停與點擊效果 */
        input[type="button"]:hover {
            filter: brightness(0.95);
            transform: translateY(-2px);
        }

        input[type="button"]:active {
            transform: translateY(1px);
        }

        /* 特殊按鍵顏色微調 */
        .operator {
            background-color: var(--btn-op) !important;
            color: white !important;
        }

        .clear {
            background-color: var(--btn-special) !important;
            color: white !important;
        }

        .equals {
            background-color: #819171 !important;
            color: white !important;
        }

        /* 調整 0 的寬度使其稍微不同 */
        .btn-zero {
            grid-column: span 1;
        }
    </style>
</head>
<body>

<div class="calculator">
    <h1>黃莫迦的計算機</h1>
    <input type="text" id="display" readonly placeholder="0">
    
    <div class="buttons">
        <input type="button" class="clear" value="C" onclick="clearDisplay()">
        <input type="button" class="operator" value="÷" onclick="appendToDisplay('/')">
        <input type="button" class="operator" value="×" onclick="appendToDisplay('*')">
        <input type="button" class="operator" value="-" onclick="appendToDisplay('-')">
        
        <input type="button" value="7" onclick="appendToDisplay('7')">
        <input type="button" value="8" onclick="appendToDisplay('8')">
        <input type="button" value="9" onclick="appendToDisplay('9')">
        <input type="button" class="operator" value="+" onclick="appendToDisplay('+')">
        
        <input type="button" value="4" onclick="appendToDisplay('4')">
        <input type="button" value="5" onclick="appendToDisplay('5')">
        <input type="button" value="6" onclick="appendToDisplay('6')">
        <input type="button" class="equals" value="=" onclick="calculate()">
        
        <input type="button" value="1" onclick="appendToDisplay('1')">
        <input type="button" value="2" onclick="appendToDisplay('2')">
        <input type="button" value="3" onclick="appendToDisplay('3')">
        <input type="button" value="0" onclick="appendToDisplay('0')">
    </div>
</div>

<script>
    function appendToDisplay(value) {
        const display = document.getElementById("display");
        if (display.value === 'Error') display.value = '';
        display.value += value;
    }

    function clearDisplay() {
        document.getElementById("display").value = '';
    }

    function calculate() {
        var expression = document.getElementById("display").value;
        try {
            if (expression.trim() === "") return;
            // 替換顯示用的符號回運算符
            let result = eval(expression);
            // 處理小數點過長的情況
            document.getElementById("display").value = Number.isInteger(result) ? result : result.toFixed(4).replace(/\.?0+$/, "");
        } catch (e) {
            document.getElementById("display").value = 'Error';
        }
    }
</script>

</body>
</html>
